<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você está offline - 123 Testando</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #09090b 0%, #18181b 100%);
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
      animation: fadeIn 0.5s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #FF6B35 0%, #ff8c5a 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: 0 10px 40px rgba(255, 107, 53, 0.3);
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #fafafa;
    }
    
    p {
      font-size: 16px;
      color: #a1a1aa;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B35 0%, #ff8c5a 100%);
      color: white;
      padding: 15px 40px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
      cursor: pointer;
      border: none;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(255, 107, 53, 0.5);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .features {
      margin-top: 40px;
      padding-top: 40px;
      border-top: 1px solid #27272a;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
      color: #a1a1aa;
      font-size: 14px;
    }
    
    .feature-icon {
      color: #FF6B35;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Você está offline!</h1>
    <p>
      Mas não se preocupe! Você ainda pode ver as promoções que já carregou antes. 
      Assim que voltar a conexão, tudo será atualizado automaticamente.
    </p>
    <button class="button" onclick="window.location.reload()">
      🔄 Tentar novamente
    </button>
    
    <div class="features">
      <div class="feature-item">
        <span class="feature-icon">✨</span>
        <span>Promoções salvas no seu dispositivo</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">🚀</span>
        <span>Carregamento super rápido</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">🔔</span>
        <span>Notificações de novas ofertas</span>
      </div>
    </div>
  </div>
</body>
</html>
